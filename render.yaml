services:
  - type: web
    name: last-min-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: last-min-db
          property: connectionString
      - key: PORT
        value: "3001"
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

databases:
  - name: last-min-db
    databaseName: lastmin
    user: lastminuser
    plan: free
